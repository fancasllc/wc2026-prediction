<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 700" role="img" aria-labelledby="title desc">
  <title id="title">2026 Soccer World Prediction Banner</title>
  <desc id="desc">Mint and sky blue soccer themed banner with a trophy, ball, and large 2026 text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#78efb8"/>
      <stop offset="0.5" stop-color="#87e6cf"/>
      <stop offset="1" stop-color="#82d5e5"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="1" y2="1">
